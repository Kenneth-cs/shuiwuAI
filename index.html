<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>税悟 AI - 智能财税助手</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #f0fdf4 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo-wrap {
      display: flex; align-items: center; gap: 14px; margin-bottom: 12px;
    }
    .logo-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: white; font-weight: 900;
      box-shadow: 0 8px 24px rgba(34,197,94,0.3);
    }
    .logo-text { line-height: 1.2; }
    .logo-text h1 { font-size: 32px; font-weight: 800; color: #0f172a; }
    .logo-text p { font-size: 14px; color: #16a34a; font-weight: 500; letter-spacing: 1px; }

    .tagline {
      font-size: 18px; color: #475569; margin-bottom: 48px;
      text-align: center; max-width: 480px; line-height: 1.6;
    }

    .cards {
      display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
      max-width: 680px; width: 100%;
    }

    .card {
      background: white; border-radius: 20px; padding: 32px 28px;
      text-decoration: none; color: inherit;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      border: 2px solid transparent;
      transition: all 0.2s ease;
      flex: 1; min-width: 260px; max-width: 300px;
      display: flex; flex-direction: column; align-items: flex-start; gap: 12px;
    }
    .card:hover {
      border-color: #22c55e;
      box-shadow: 0 8px 32px rgba(34,197,94,0.15);
      transform: translateY(-3px);
    }

    .card-icon {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; font-size: 26px;
    }
    .card-icon.green { background: #dcfce7; }
    .card-icon.blue  { background: #dbeafe; }

    .card-title { font-size: 20px; font-weight: 700; color: #0f172a; }
    .card-desc  { font-size: 14px; color: #64748b; line-height: 1.6; }

    .card-badge {
      margin-top: auto; padding: 4px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      background: #f0fdf4; color: #16a34a;
    }

    .footer {
      margin-top: 48px; font-size: 13px; color: #94a3b8; text-align: center;
    }
    .footer a { color: #22c55e; text-decoration: none; }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <div class="logo-icon">税</div>
    <div class="logo-text">
      <h1>税悟 AI</h1>
      <p>INTELLIGENT LEDGER</p>
    </div>
  </div>

  <p class="tagline">用 AI 帮小微企业搞定每月报税，从数据采集到申报单一步到位</p>

  <div class="cards">
    <a class="card" href="申报工具箱.html">
      <div class="card-icon green">📊</div>
      <div class="card-title">申报工具箱</div>
      <div class="card-desc">
        三路并行采集财务数据：对话输入、发票 OCR 识别、财务报表上传，AI 汇总后一键生成申报单
      </div>
      <div class="card-badge">第一步：数据采集</div>
    </a>

    <a class="card" href="辅助报税.html">
      <div class="card-icon blue">📋</div>
      <div class="card-title">辅助报税</div>
      <div class="card-desc">
        AI 自动填写增值税、企业所得税、文化事业建设费申报表，高亮展示计算过程和政策依据
      </div>
      <div class="card-badge">第二步：填表申报</div>
    </a>
  </div>

  <p class="footer">
    税悟 AI · Demo 版本 &nbsp;|&nbsp;
    AI 引擎：<a href="https://www.volcengine.com/" target="_blank">火山引擎 doubao-seed-2-0-pro</a>
  </p>

</body>
</html>
